<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/bloc_form_plus/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="bloc_form web demo — Flutter 3.44 compatible.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bloc Form Web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="theme-color" content="#2A579A">

  <title>Bloc Form Web</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #2A579A 0%, #1E3C72 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      color: white;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    .loading-text {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .loading-subtext {
      font-size: 14px;
      opacity: 0.8;
    }

    .progress-bar {
      width: 220px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      margin-top: 15px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logo {
      margin-bottom: 30px;
      font-size: 24px;
      font-weight: bold;
      display: flex;
      align-items: center;
    }

    .logo-icon {
      margin-right: 10px;
      font-size: 32px;
    }

    .hide {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="logo">
      <span class="logo-icon">📋</span>
      <span>Bloc Form Web</span>
    </div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading application</div>
    <div class="loading-subtext">Flutter 3.44 web bootstrap</div>
    <div class="progress-bar">
      <div id="progress" class="progress"></div>
    </div>
  </div>

  <!-- Flutter 3.44+ web initialization: https://docs.flutter.dev/platform-integration/web/initialization -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
